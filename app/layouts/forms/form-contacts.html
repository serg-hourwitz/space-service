<form action="#" class="request-form-modal__form request-form-modal__form--contacts">
      <div class="request-form-modal__input-group">
        <label for="name" class="request-form-modal__label">Name</label>
        <input type="text" name="name" 
          class="request-form-modal__input" required
          placeholder="Your name">
      </div>

      <div class="request-form-modal__input-group">
        <label for="email" class="request-form-modal__label">E-mail</label>
        <input type="email" name="email"
          class="request-form-modal__input" required
          placeholder="E-Mail">
      </div>

      <div class="request-form-modal__input-group">
        <label for="phone" class="request-form-modal__label">Phone Number</label>
        <div class="request-form-modal__input-group--block">
          <!--=include selects/form-phone-select.html-->
          <input type="tel" name="phone" pattern="[0-9]{2}-[0-9]{3}-[0-9]{2}-[0-9]{2}"
            class="request-form-modal__input" required
            placeholder="00-000-00-00">
        </div>
      </div>

      <input type="submit" value="Book an appointment">

    </form>
